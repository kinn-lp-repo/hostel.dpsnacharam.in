<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hostel - Excellence in Boarding Education | Delhi Public School Nacharam</title>
    <meta name="description" content="Delhi Public School Nacharam is a leading boarding school in Hyderabad, Telangana. It offers a unique blend of academic excellence and holistic education for students in grades 6-12. Our boarding school provides a safe and supportive environment for students to grow and thrive.">
    <meta name="keywords" content="Delhi Public School Nacharam, boarding school, academic excellence, holistic education, grades 6-12, Hyderabad, Telangana">
    <meta name="author" content="Delhi Public School Nacharam">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
  </head>
  <body>
    <!-- Preloader -->
    <div class="preloader" id="preloader" aria-label="Loading">
      <!-- Background Elements -->
      <div class="preloader-bg">
        <div class="grid-pattern"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="corner-accent top-left"></div>
        <div class="corner-accent bottom-right"></div>
      </div>

      <!-- Main Content -->
      <div class="preloader-content">
        <!-- Logo with animated rings -->
        <div class="preloader-logo-wrapper">
          <div class="ring-outer"></div>
          <div class="ring-inner"></div>
          <div class="logo-glow"></div>
          <div class="preloader-logo">
            <img src="/hostel/dps-emblum.webp" alt="DPS Nacharam" />
          </div>
        </div>

        <!-- Text -->
        <div class="preloader-text">
          <h2>DPS Nacharam</h2>
          <div class="divider"></div>
          <p>Admissions Open</p>
          <span class="year">2026-2027</span>
        </div>

        <!-- Progress indicator -->
        <div class="progress-wrapper">
          <div class="progress-dots">
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
          </div>
          <span class="progress-text">Loading</span>
        </div>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
